description: >-
  Shenandoah Telecommunications Company (SHEN), doing business as Shentel, is
  a publicly traded telecommunications company headquartered in Edinburg, Virginia.
  For over 100 years, Shentel has provided internet, TV, and phone services to
  residential and business customers across Virginia, West Virginia, Maryland,
  Pennsylvania, Kentucky, Delaware, Ohio, and Indiana. The company operates a
  digital wireless and wireline network delivering broadband internet, video, and
  voice services. Through its Glo Fiber and Glo Fiber Business brands, Shentel
  provides high-speed fiber optic internet, Ethernet, wavelength services, managed
  network services, and dark fiber leasing to enterprise and wholesale customers.
  Shentel operates approximately 15,400 route miles of fiber on a MEF-certified
  network, with connectivity including the Washington D.C. market via CoreSite.
